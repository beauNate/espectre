name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
          (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/francescopace/espectre/blob/develop/CLA.md'
          branch: 'develop'
          allowlist: 'dependabot[bot]'
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge this PR,
            you need to sign the [Contributor License Agreement](https://github.com/francescopace/espectre/blob/develop/CLA.md).

            Please read the CLA and then comment below with exactly:

            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
